<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Shootout</title>

    <style>
        :root {
            --bg: #111315;
            --text: #f5f8fa;
            --muted: #a9b4bc;
            --accent: #35d07f;
            --accent-dark: #26b86c;
            --line: #35404a;
            --hoop: #d94532;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(53, 208, 127, 0.14), transparent 32rem),
                linear-gradient(135deg, #101214 0%, var(--bg) 58%, #171b20 100%);
        }

        main {
            width: min(100%, 540px);
            text-align: center;
        }

        nav {
            margin-bottom: 18px;
            text-align: left;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
        }

        nav a:hover {
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.4rem);
            letter-spacing: 0;
        }

        .score-row,
        .stats-row {
            display: grid;
            gap: 8px;
            margin: 14px auto;
            color: var(--muted);
            font-weight: 800;
        }

        .score-row {
            grid-template-columns: repeat(3, 1fr);
        }

        .stats-row {
            grid-template-columns: repeat(3, 1fr);
            margin-top: -4px;
        }

        .score-row span,
        .stats-row span {
            min-height: 38px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
        }

        #status {
            grid-column: 1 / -1;
            color: var(--accent);
        }

        canvas {
            width: min(100%, 430px);
            aspect-ratio: 1;
            height: auto;
            display: block;
            margin: 18px auto 0;
            background: #162027;
            border: 2px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.26);
        }

        .controls {
            margin-top: 18px;
            display: grid;
            gap: 12px;
            text-align: left;
        }

        .control-row {
            display: grid;
            gap: 10px;
        }

        .control-row label {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.95rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            min-height: 46px;
            padding: 0 20px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #09120d;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .hint {
            margin: 14px auto 0;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }

        @media (max-width: 520px) {

            .score-row,
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main>
        <nav>
            <a href="games.html">Back to games</a>
        </nav>

        <h1>Basketball Shootout</h1>

        <div class="score-row">
            <span id="score">Score: 0</span>
            <span id="bestScore">Best: 0</span>
            <span id="status">Choose angle and power</span>
        </div>

        <div class="stats-row" aria-label="Shot statistics">
            <span id="madeShots">Made: 0</span>
            <span id="attempts">Attempts: 0</span>
            <span id="accuracy">Accuracy: 0%</span>
        </div>

        <canvas id="game" width="400" height="400" aria-label="Basketball shootout court"></canvas>

        <div class="controls">
            <div class="control-row">
                <label for="angle">Angle <span id="angleValue">45 deg</span></label>
                <input id="angle" type="range" min="20" max="70" value="45">
            </div>
            <div class="control-row">
                <label for="power">Power <span id="powerValue">14</span></label>
                <input id="power" type="range" min="8" max="18" value="14">
            </div>
        </div>

        <div class="actions">
            <button id="shootBtn" type="button">Shoot</button>
            <button id="restartBtn" type="button">Reset</button>
        </div>

        <p class="hint">Press Space to shoot. Adjust angle and power to find the clean shot.</p>
    </main>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreText = document.getElementById("score");
        const bestScoreText = document.getElementById("bestScore");
        const madeShotsText = document.getElementById("madeShots");
        const attemptsText = document.getElementById("attempts");
        const accuracyText = document.getElementById("accuracy");
        const statusText = document.getElementById("status");
        const shootBtn = document.getElementById("shootBtn");
        const restartBtn = document.getElementById("restartBtn");
        const angleInput = document.getElementById("angle");
        const powerInput = document.getElementById("power");
        const angleValue = document.getElementById("angleValue");
        const powerValue = document.getElementById("powerValue");

        const hoop = {
            x: 292,
            y: 120,
            width: 88,
            height: 10,
            netHeight: 30
        };

        const ballRadius = 16;
        const gravity = 0.38;
        const speedFactor = 1.32;
        const bestScoreKey = "basketballBestScore";

        let score = 0;
        let bestScore = Number(localStorage.getItem(bestScoreKey)) || 0;
        let madeShots = 0;
        let attempts = 0;
        let shotActive = false;
        let scored = false;
        let scoreFrames = 0;
        let position;
        let velocity;
        let animationFrame;

        function resetBall() {
            position = { x: 80, y: 348 };
            velocity = { x: 0, y: 0 };
            shotActive = false;
            scored = false;
            scoreFrames = 0;
            statusText.textContent = "Choose angle and power";
            drawScene();
        }

        function updateLabels() {
            angleValue.textContent = `${angleInput.value} deg`;
            powerValue.textContent = powerInput.value;

            if (!shotActive) {
                drawScene();
            }
        }

        function updateStats() {
            const accuracy = attempts ? Math.round((madeShots / attempts) * 100) : 0;
            madeShotsText.textContent = `Made: ${madeShots}`;
            attemptsText.textContent = `Attempts: ${attempts}`;
            accuracyText.textContent = `Accuracy: ${accuracy}%`;
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCourt();
            drawBackboard();
            drawHoop();
            drawAimGuide();
            drawBall();
            drawNetFront();
        }

        function drawCourt() {
            const courtGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            courtGradient.addColorStop(0, "#152630");
            courtGradient.addColorStop(0.72, "#172329");
            courtGradient.addColorStop(1, "#223018");
            ctx.fillStyle = courtGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255,255,255,0.07)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(200, 380, 80, 0, Math.PI, true);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, 378);
            ctx.lineTo(canvas.width, 378);
            ctx.stroke();
        }

        function drawBackboard() {
            ctx.fillStyle = "rgba(248, 251, 255, 0.88)";
            ctx.fillRect(274, 72, 108, 10);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.42)";
            ctx.lineWidth = 2;
            ctx.strokeRect(282, 82, 92, 58);
        }

        function drawHoop() {
            ctx.fillStyle = "#d94532";
            ctx.fillRect(hoop.x, hoop.y, hoop.width, hoop.height);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(hoop.x + 10, hoop.y + hoop.height + 5);
            ctx.lineTo(hoop.x + 26, hoop.y + hoop.height + 17);
            ctx.lineTo(hoop.x + 42, hoop.y + hoop.height + 5);
            ctx.lineTo(hoop.x + 58, hoop.y + hoop.height + 17);
            ctx.stroke();
        }

        function drawNetFront() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(hoop.x + 8, hoop.y + hoop.height);
            ctx.lineTo(hoop.x + 14, hoop.y + hoop.height + hoop.netHeight);
            ctx.lineTo(hoop.x + 22, hoop.y + hoop.height);
            ctx.moveTo(hoop.x + 30, hoop.y + hoop.height + hoop.netHeight);
            ctx.lineTo(hoop.x + 40, hoop.y + hoop.height);
            ctx.moveTo(hoop.x + 50, hoop.y + hoop.height + hoop.netHeight);
            ctx.lineTo(hoop.x + 60, hoop.y + hoop.height);
            ctx.moveTo(hoop.x + 70, hoop.y + hoop.height + hoop.netHeight);
            ctx.lineTo(hoop.x + 80, hoop.y + hoop.height);
            ctx.stroke();
        }

        function drawBall() {
            const shadowY = Math.min(378, position.y + ballRadius + 8);
            const shadowScale = Math.max(0.35, 1 - Math.abs(342 - position.y) / 260);

            ctx.fillStyle = "rgba(0, 0, 0, 0.22)";
            ctx.beginPath();
            ctx.ellipse(position.x, shadowY, ballRadius * 1.1 * shadowScale, ballRadius * 0.34 * shadowScale, 0, 0, Math.PI * 2);
            ctx.fill();

            const ballGradient = ctx.createRadialGradient(
                position.x - ballRadius * 0.35,
                position.y - ballRadius * 0.45,
                ballRadius * 0.1,
                position.x,
                position.y,
                ballRadius
            );

            ballGradient.addColorStop(0, "#ffd08a");
            ballGradient.addColorStop(0.52, "#f28b2e");
            ballGradient.addColorStop(1, "#b65313");

            ctx.beginPath();
            ctx.fillStyle = ballGradient;
            ctx.arc(position.x, position.y, ballRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#5f2b0b";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.beginPath();
            ctx.arc(position.x, position.y, ballRadius - 1, 0, Math.PI * 2);
            ctx.clip();

            ctx.strokeStyle = "rgba(75, 30, 5, 0.85)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(position.x - ballRadius, position.y);
            ctx.lineTo(position.x + ballRadius, position.y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(position.x, position.y - ballRadius);
            ctx.lineTo(position.x, position.y + ballRadius);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(position.x - ballRadius * 0.72, position.y, ballRadius * 0.78, -Math.PI / 2, Math.PI / 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(position.x + ballRadius * 0.72, position.y, ballRadius * 0.78, Math.PI / 2, Math.PI * 1.5);
            ctx.stroke();
            ctx.restore();
        }

        function drawAimGuide() {
            if (shotActive) {
                return;
            }

            const angle = Number(angleInput.value) * (Math.PI / 180);
            const power = Number(powerInput.value);
            const speed = power * speedFactor;
            let guideX = position.x;
            let guideY = position.y;
            let guideVX = Math.cos(angle) * speed;
            let guideVY = -Math.sin(angle) * speed;

            ctx.fillStyle = "rgba(53, 208, 127, 0.45)";
            for (let i = 0; i < 34; i += 1) {
                guideX += guideVX;
                guideY += guideVY;
                guideVY += 0.55;

                if (i % 3 === 0) {
                    ctx.beginPath();
                    ctx.arc(guideX, guideY, 2.4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function shoot() {
            if (shotActive) {
                return;
            }

            attempts += 1;
            updateStats();

            const angle = Number(angleInput.value) * (Math.PI / 180);
            const power = Number(powerInput.value);
            const speed = power * speedFactor;

            velocity = {
                x: Math.cos(angle) * speed,
                y: -Math.sin(angle) * speed - 1.4
            };

            scored = false;
            scoreFrames = 0;
            shotActive = true;
            statusText.textContent = "Shooting...";
            animationFrame = requestAnimationFrame(animateShot);
        }

        function animateShot() {
            if (!shotActive) {
                return;
            }

            position.x += velocity.x;
            position.y += velocity.y;
            velocity.y += gravity;

            if (!scored && hasScored()) {
                scored = true;
                score += 1;
                madeShots += 1;
                scoreText.textContent = `Score: ${score}`;
                updateStats();
                updateBestScore();
                statusText.textContent = "Nice shot!";
            }

            if (scored) {
                scoreFrames += 1;
                if (scoreFrames > 28) {
                    endShot("Nice shot!");
                    return;
                }
            } else if (position.y + ballRadius >= 378 || position.x > canvas.width + ballRadius || position.x < -ballRadius) {
                endShot("Missed. Try again.");
                return;
            }

            drawScene();
            animationFrame = requestAnimationFrame(animateShot);
        }

        function hasScored() {
            const inHoopX = position.x > hoop.x + 12 && position.x < hoop.x + hoop.width - 12;
            const inHoopY = position.y > hoop.y + hoop.height - ballRadius / 2 && position.y < hoop.y + hoop.height + hoop.netHeight + ballRadius;
            return inHoopX && inHoopY && velocity.y > 0;
        }

        function endShot(message) {
            shotActive = false;
            cancelAnimationFrame(animationFrame);
            statusText.textContent = message;
            setTimeout(() => {
                if (!shotActive) {
                    resetBall();
                }
            }, 700);
        }

        function restartGame() {
            score = 0;
            madeShots = 0;
            attempts = 0;
            scoreText.textContent = "Score: 0";
            bestScoreText.textContent = `Best: ${bestScore}`;
            updateStats();
            resetBall();
        }

        function updateBestScore() {
            if (score <= bestScore) {
                return;
            }

            bestScore = score;
            localStorage.setItem(bestScoreKey, String(bestScore));
            bestScoreText.textContent = `Best: ${bestScore}`;
        }

        angleInput.addEventListener("input", updateLabels);
        powerInput.addEventListener("input", updateLabels);
        shootBtn.addEventListener("click", shoot);
        restartBtn.addEventListener("click", restartGame);

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space" && !shotActive) {
                event.preventDefault();
                shoot();
            }
        });

        updateLabels();
        updateStats();
        bestScoreText.textContent = `Best: ${bestScore}`;
        resetBall();
    </script>
</body>

</html>
